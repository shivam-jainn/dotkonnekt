services:
  vectordb:
    image: qdrant/qdrant:latest
    container_name: ${QDRANT_CONTAINER_NAME:-vectordb-dtx}
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - vectordb_data:/qdrant/storage

  postgres:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres-dtx}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dtx_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dtx_password}
      POSTGRES_DB: ${POSTGRES_DB:-dtx_database}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ${MINIO_CONTAINER_NAME:-minio-dtx}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    volumes:
      - minio_data:/data

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: ${RABBITMQ_CONTAINER_NAME:-rabbitmq-dtx}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  vectordb_data:
  postgres_data:
  minio_data:
  rabbitmq_data:
